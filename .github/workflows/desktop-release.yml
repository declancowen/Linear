name: Desktop Release

on:
  push:
    tags:
      - "v*.*.*"
      - "!v*.*.*-*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.0.2 or v0.0.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  metadata:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      release_name: ${{ steps.release_meta.outputs.release_name }}
      tag: ${{ steps.release_meta.outputs.tag }}
      version: ${{ steps.release_meta.outputs.version }}
    steps:
      - name: Resolve release version
        id: release_meta
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            raw="${INPUT_VERSION}"
          else
            raw="${GITHUB_REF_NAME}"
          fi

          version="${raw#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid stable release version: $raw" >&2
            echo "Stable desktop releases must use x.y.z or vx.y.z." >&2
            exit 1
          fi

          tag="v$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_name=Recipe Room $tag" >> "$GITHUB_OUTPUT"

  build-macos:
    name: Build signed macOS release
    needs: metadata
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.0

      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package version
        env:
          EXPECTED_VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          node -e "const pkg=require('./package.json'); if (pkg.version !== process.env.EXPECTED_VERSION) { console.error('package.json version (' + pkg.version + ') must match ' + process.env.EXPECTED_VERSION + '.'); process.exit(1); }"

      - name: Build signed macOS desktop release
        shell: bash
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          DESKTOP_UPDATE_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          has_all() {
            for value in "$@"; do
              if [[ -z "$value" ]]; then
                return 1
              fi
            done
            return 0
          }

          if ! has_all "$CSC_LINK" "$CSC_KEY_PASSWORD" "$APPLE_API_KEY" "$APPLE_API_KEY_ID" "$APPLE_API_ISSUER"; then
            echo "macOS signing secrets are required for desktop releases." >&2
            echo "Missing one or more of CSC_LINK, CSC_KEY_PASSWORD, APPLE_API_KEY, APPLE_API_KEY_ID, APPLE_API_ISSUER." >&2
            echo "Unsigned macOS builds can download updates, but Squirrel.Mac rejects them during install." >&2
            exit 1
          fi

          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY" > "$key_path"
          export APPLE_API_KEY="$key_path"

          pnpm desktop:release:mac

      - name: Archive macOS app bundle for preflight
        run: tar -czf dist/electron/Recipe-Room-mac-app-bundle.tgz -C dist/electron "Recipe Room.app"

      - name: Upload macOS release artifacts
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: desktop-release-macos
          path: |
            dist/electron/Recipe-Room-mac-app-bundle.tgz
            dist/electron/Recipe Room.app/**
            dist/electron/Recipe-Room-mac-*.dmg
            dist/electron/Recipe-Room-mac-*.zip
            dist/electron/*.blockmap
            dist/electron/latest-mac.yml

  build-windows:
    name: Build Windows release
    needs: metadata
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.0

      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package version
        env:
          EXPECTED_VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          node -e "const pkg=require('./package.json'); if (pkg.version !== process.env.EXPECTED_VERSION) { console.error('package.json version (' + pkg.version + ') must match ' + process.env.EXPECTED_VERSION + '.'); process.exit(1); }"

      - name: Build Windows desktop release
        env:
          DESKTOP_UPDATE_REPOSITORY: ${{ github.repository }}
        run: pnpm desktop:release:windows

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: desktop-release-windows
          path: |
            dist/electron/Recipe-Room-win-*.exe
            dist/electron/Recipe-Room-win-*.exe.blockmap
            dist/electron/latest.yml

  publish:
    name: Publish GitHub release
    needs:
      - build-macos
      - build-windows
      - metadata
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-release-macos
          path: dist/electron

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-release-windows
          path: dist/electron

      - name: Restore macOS app bundle permissions
        run: tar -xzf dist/electron/Recipe-Room-mac-app-bundle.tgz -C dist/electron

      - name: Release preflight
        run: node scripts/desktop-release-preflight.mjs

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            dist/electron/*.dmg
            dist/electron/*.zip
            dist/electron/*.exe
            dist/electron/*.blockmap
            dist/electron/latest-mac.yml
            dist/electron/latest.yml
          generate_release_notes: true
          make_latest: true
          name: ${{ needs.metadata.outputs.release_name }}
          tag_name: ${{ needs.metadata.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
